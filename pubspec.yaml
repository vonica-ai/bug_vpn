publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0


dependencies:
  flutter:
    sdk: flutter
  uicons:
  toastification:
  loader_overlay:
  flutter_animate:
  shared_preferences:
  http:
  flutter_riverpod:
  flutter_v2ray_client:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  icons_launcher:

flutter:
  uses-material-design: true
  assets:
    - images/
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Bold.ttf
